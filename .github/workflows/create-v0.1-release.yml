name: Create v0.1 BIOS Research Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="v0.1-bios-research"
          TITLE="v0.1 BIOS Research Snapshot"
          NOTES="releases/v0.1-bios-research.md"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi

          gh release create "$TAG" \
            --target main \
            --title "$TITLE" \
            --notes-file "$NOTES"
